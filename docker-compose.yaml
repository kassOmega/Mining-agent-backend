version: "3.7"

services:
  db:
    image: postgres:14
    container_name: kass_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mining_db
    volumes:
      - ./data:/var/lib/postgresql/data
