name: Deploy Backend Image

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main

env:
  DOCKER_REGISTRY: image.docker.zemichaeltesfaye.com
  DOCKER_USERNAME: zzimick
  DOCKER_PASSWORD: p@ssSecre1
  DOCKER_IMAGE: image.docker.zemichaeltesfaye.com/kass/mining-platform-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      # Safely execute Prisma migrations on your production DB before pushing code
      - name: Run Production Database Migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
          registry: ${{ env.DOCKER_REGISTRY }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
